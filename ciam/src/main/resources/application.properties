server.port=8081
spring.application.name=ciam-service

# H2 File-based persistence (separate DB from CRM)
spring.datasource.url=jdbc:h2:file:./data/ciamdb;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false

# JWT
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=604800000

# RSA Key Paths
jwt.key-dir=${JWT_KEY_DIR:./keys}

# Cookie
app.cookie.secure=${COOKIE_SECURE:true}

# CORS
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:4200}

# Rate Limiting (Login)
app.rate-limit.max-attempts=10
app.rate-limit.window-seconds=300

# Demo mode
app.demo-mode=true
