name: CI

on:
  push:
    branches: ['**']

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend (Java / Spring Boot) ──────────────────────────────
  backend:
    name: Backend – Lint · Build · Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
          cache-dependency-path: backend/pom.xml

      - name: Compile (lint)
        run: mvn -B clean compile -DskipTests

      - name: Run tests
        run: mvn -B test

      - name: Package
        run: mvn -B package -DskipTests

  # ── CIAM (Kotlin / Spring Boot) ──────────────────────────────
  ciam:
    name: CIAM – Lint · Build · Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ciam
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
          cache-dependency-path: ciam/pom.xml

      - name: Compile (lint)
        run: mvn -B clean compile -DskipTests

      - name: Run tests
        run: mvn -B test

      - name: Package
        run: mvn -B package -DskipTests

  # ── Frontend (Angular) ───────────────────────────────────────
  frontend:
    name: Frontend – Lint · Build · Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx ng lint

      - name: Build
        run: npx ng build

      - name: Test
        run: npx ng test --no-watch --browsers=ChromeHeadless
