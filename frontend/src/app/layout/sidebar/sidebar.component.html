<nav class="sidebar d-flex flex-column">
  @for (section of sections; track section.title) {
    @if (hasVisibleItems(section)) {
      <div class="nav-section-header" [class.mt-3]="!$first">{{ section.title }}</div>
      <ul class="nav flex-column">
        @for (item of visibleItems(section.items); track item.route) {
          <li class="nav-item">
            <a class="nav-link" [routerLink]="item.route" routerLinkActive="active">
              <fa-icon [icon]="item.icon"></fa-icon> {{ item.label }}
            </a>
          </li>
        }
      </ul>
    }
  }

  <div class="mt-auto sidebar-footer">
    Made by <a href="https://atra.consulting/" target="_blank" rel="noopener noreferrer" class="footer-link">atra.consulting</a>
  </div>
</nav>
