<div class="page-header">
  <h2>{{ 'PERSON.LIST_TITLE' | translate }}</h2>
  <a routerLink="neu" class="btn btn-primary">{{ 'PERSON.NEW' | translate }}</a>
</div>

@if (loading) {
  <app-loading-spinner />
} @else {
  <ag-grid-angular
    style="width: 100%; height: calc(100vh - 180px)"
    [theme]="theme"
    [rowData]="rowData"
    [columnDefs]="columnDefs"
    [defaultColDef]="defaultColDef"
    [autoSizeStrategy]="autoSizeStrategy"
    (rowClicked)="onRowClicked($event)"
  />
}
