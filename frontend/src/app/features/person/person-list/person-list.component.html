<div class="page-header">
  <h2>Personen@if (totalRows > 0) {: {{ isFilterActive ? displayedRows + '/' + totalRows : totalRows }}}</h2>
  <select class="form-select form-select-sm" style="width: auto"
    [(ngModel)]="selectedAbteilungId" (ngModelChange)="onDepartmentChange()">
    <option [ngValue]="null">Alle Abteilungen</option>
    @for (abt of abteilungen; track abt.id) {
      <option [ngValue]="abt.id">{{ abt.name }}</option>
    }
  </select>
  <a routerLink="neu" class="btn btn-primary">Neue Person</a>
</div>

@if (loading) {
  <app-loading-spinner />
} @else {
  <ag-grid-angular
    style="width: 100%; height: calc(100vh - 180px)"
    [theme]="theme"
    [rowData]="rowData"
    [columnDefs]="columnDefs"
    [defaultColDef]="defaultColDef"
    [autoSizeStrategy]="autoSizeStrategy"
    (gridReady)="onGridReady($event)"
    (modelUpdated)="onModelUpdated()"
    (rowClicked)="onRowClicked($event)"
  />
}
