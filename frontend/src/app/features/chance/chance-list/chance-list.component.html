<div class="page-header">
  <h2>
    Chancen@if (totalRows > 0) {: {{ displayedRows === totalRows ? totalRows : displayedRows + '/' + totalRows }}}
  </h2>
  <div class="d-flex gap-3 align-items-center">
    <div class="btn-group">
      <a routerLink="/chancen" class="btn btn-outline-secondary active">Liste</a>
      <a routerLink="/chancen/board" class="btn btn-outline-secondary">Board</a>
    </div>
    <a routerLink="neu" class="btn btn-primary">Neue Chance</a>
  </div>
</div>

@if (loading) {
  <app-loading-spinner />
} @else {
  <ag-grid-angular
    style="width: 100%; height: calc(100vh - 180px)"
    [theme]="theme"
    [rowData]="rowData"
    [columnDefs]="columnDefs"
    [defaultColDef]="defaultColDef"
    [autoSizeStrategy]="autoSizeStrategy"
    (gridReady)="onGridReady($event)"
    (modelUpdated)="onModelUpdated()"
    (filterChanged)="onFilterChanged()"
    (rowClicked)="onRowClicked($event)"
  />
}
