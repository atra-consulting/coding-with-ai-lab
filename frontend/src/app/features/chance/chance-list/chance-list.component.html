<div class="page-header">
  <h2>{{ 'CHANCE.LIST_TITLE' | translate }}</h2>
  <div class="d-flex gap-3 align-items-center">
    <div class="btn-group">
      <a routerLink="/chancen" class="btn btn-outline-secondary active">{{ 'CHANCE.LIST_VIEW' | translate }}</a>
      <a routerLink="/chancen/board" class="btn btn-outline-secondary">{{ 'CHANCE.BOARD_VIEW' | translate }}</a>
    </div>
    <a routerLink="neu" class="btn btn-primary">{{ 'CHANCE.NEW' | translate }}</a>
  </div>
</div>

@if (loading) {
  <app-loading-spinner />
} @else {
  <ag-grid-angular
    style="width: 100%; height: calc(100vh - 180px)"
    [theme]="theme"
    [rowData]="rowData"
    [columnDefs]="columnDefs"
    [defaultColDef]="defaultColDef"
    [autoSizeStrategy]="autoSizeStrategy"
    (rowClicked)="onRowClicked($event)"
  />
}
