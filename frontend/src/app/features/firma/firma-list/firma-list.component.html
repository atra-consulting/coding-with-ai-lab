<div class="page-header">
  <h2>
    Firmen@if (totalRows > 0) {: {{ isFilterActive ? displayedRows + '/' + totalRows : totalRows }}}
  </h2>
  <a routerLink="neu" class="btn btn-primary">Neue Firma</a>
</div>

@if (loading) {
  <app-loading-spinner />
} @else {
  <div class="mb-2">
    <div class="form-check">
      <input class="form-check-input" type="checkbox" id="favoritenOnly"
             [(ngModel)]="favoritenOnly" (change)="onFavoritenOnlyChange()">
      <label class="form-check-label" for="favoritenOnly">Nur Favoriten anzeigen</label>
    </div>
  </div>
  <ag-grid-angular
    style="width: 100%; height: calc(100vh - 210px)"
    [theme]="theme"
    [rowData]="rowData"
    [columnDefs]="columnDefs"
    [defaultColDef]="defaultColDef"
    [autoSizeStrategy]="autoSizeStrategy"
    (gridReady)="onGridReady($event)"
    (modelUpdated)="onModelUpdated()"
    (rowClicked)="onRowClicked($event)"
  />
}
