<div class="card">
  <div class="card-header">
    <h5 class="card-title mb-0">Durchschnittsgehalt nach Abteilung</h5>
  </div>
  <div class="card-body">
    @for (dept of departments; track dept.departmentName) {
      <div class="mb-3">
        <div class="d-flex justify-content-between mb-1">
          <span>{{ dept.departmentName }}</span>
          <span class="text-muted">{{ dept.averageSalary | eurCurrency }}</span>
        </div>
        <div class="progress" style="height: 20px">
          <div class="progress-bar bg-primary" [style.width.%]="getWidth(dept.averageSalary)"></div>
        </div>
      </div>
    } @empty {
      <p class="text-muted">Keine Gehaltsdaten vorhanden</p>
    }
  </div>
</div>
