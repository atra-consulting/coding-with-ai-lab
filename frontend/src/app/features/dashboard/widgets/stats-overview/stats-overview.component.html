<div class="row">
  <div class="col-xl-3 col-md-6 mb-3">
    <div class="card widget-card primary">
      <div class="card-body d-flex justify-content-between align-items-center">
        <div>
          <div class="widget-value">{{ stats.firmenCount }}</div>
          <div class="widget-label">{{ 'DASHBOARD.COMPANIES' | translate }}</div>
        </div>
        <fa-icon [icon]="faBuilding" class="widget-icon text-primary"></fa-icon>
      </div>
    </div>
  </div>
  <div class="col-xl-3 col-md-6 mb-3">
    <div class="card widget-card success">
      <div class="card-body d-flex justify-content-between align-items-center">
        <div>
          <div class="widget-value">{{ stats.personenCount }}</div>
          <div class="widget-label">{{ 'DASHBOARD.PERSONS' | translate }}</div>
        </div>
        <fa-icon [icon]="faUsers" class="widget-icon text-success"></fa-icon>
      </div>
    </div>
  </div>
  <div class="col-xl-3 col-md-6 mb-3">
    <div class="card widget-card warning">
      <div class="card-body d-flex justify-content-between align-items-center">
        <div>
          <div class="widget-value">{{ stats.aktivitaetenCount }}</div>
          <div class="widget-label">{{ 'DASHBOARD.ACTIVITIES' | translate }}</div>
        </div>
        <fa-icon [icon]="faCalendarCheck" class="widget-icon text-warning"></fa-icon>
      </div>
    </div>
  </div>
  <div class="col-xl-3 col-md-6 mb-3">
    <div class="card widget-card info">
      <div class="card-body d-flex justify-content-between align-items-center">
        <div>
          <div class="widget-value">{{ stats.offeneChancenCount }}</div>
          <div class="widget-label">{{ 'DASHBOARD.OPEN_OPPORTUNITIES' | translate }}</div>
        </div>
        <fa-icon [icon]="faChartLine" class="widget-icon text-info"></fa-icon>
      </div>
    </div>
  </div>
</div>
