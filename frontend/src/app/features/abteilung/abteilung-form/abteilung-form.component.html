<div class="page-header">
  <h2>{{ (isEdit ? 'ABTEILUNG.EDIT_TITLE' : 'ABTEILUNG.NEW') | translate }}</h2>
</div>

@if (loading) {
  <app-loading-spinner />
} @else {
  <div class="card">
    <div class="card-body">
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="row">
          <div class="col-md-6 mb-3">
            <label for="name" class="form-label">{{ 'COMMON.NAME' | translate }} *</label>
            <input
              type="text"
              class="form-control"
              id="name"
              formControlName="name"
              [class.is-invalid]="form.get('name')?.invalid && form.get('name')?.touched"
            />
            @if (form.get('name')?.invalid && form.get('name')?.touched) {
              <div class="invalid-feedback">{{ 'VALIDATION.NAME_REQUIRED' | translate }}</div>
            }
          </div>
          <div class="col-md-6 mb-3">
            <label for="firmaId" class="form-label">{{ 'PERSON.COMPANY' | translate }} *</label>
            <select class="form-select" id="firmaId" formControlName="firmaId">
              <option [ngValue]="null" disabled>{{ 'FIRMA.SELECT' | translate }}</option>
              @for (firma of firmen; track firma.id) {
                <option [ngValue]="firma.id">{{ firma.name }}</option>
              }
            </select>
          </div>
        </div>
        <div class="mb-3">
          <label for="description" class="form-label">{{ 'COMMON.DESCRIPTION' | translate }}</label>
          <textarea
            class="form-control"
            id="description"
            formControlName="description"
            rows="3"
          ></textarea>
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary" [disabled]="form.invalid">{{ 'COMMON.SAVE' | translate }}</button>
          <a routerLink="/abteilungen" class="btn btn-outline-secondary">{{ 'COMMON.CANCEL' | translate }}</a>
        </div>
      </form>
    </div>
  </div>
}
