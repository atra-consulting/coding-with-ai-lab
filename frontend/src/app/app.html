@if (isAuthenticated()) {
  <app-navbar />
  <app-notification />
  <div class="d-flex" [class.sidebar-collapsed]="layoutService.collapsed()">
    <app-sidebar />
    <div class="main-content flex-grow-1">
      <router-outlet />
    </div>
  </div>
  @if (showAssistant()) {
    <app-chat-widget />
  }
} @else {
  <app-notification />
  <router-outlet />
}
