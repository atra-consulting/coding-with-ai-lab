server.port=7070
spring.application.name=crm-backend

# H2 File-based persistence
spring.datasource.url=jdbc:h2:file:./data/crmdb;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# H2 Console (nur mit Profil 'dev' aktivieren: --spring.profiles.active=dev)
spring.h2.console.enabled=false
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# Jackson (Jackson 3 defaults to ISO-8601 strings, no timestamp override needed)

# JWT (RSA public key from CIAM service)
jwt.public-key-path=${JWT_PUBLIC_KEY_PATH:../ciam/keys/public.pem}

# CORS
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:4200}

# Demo mode
app.demo-mode=true

# Async SSE timeout (for CRM Assistant streaming)
spring.mvc.async.request-timeout=60000

# CRM Assistant (Anthropic Claude API)
assistant.anthropic.api-key=${ANTHROPIC_API_KEY:}
assistant.anthropic.model=${ANTHROPIC_MODEL:claude-sonnet-4-20250514}
assistant.anthropic.max-tokens=${ANTHROPIC_MAX_TOKENS:1024}
assistant.history.max-pairs=${ASSISTANT_HISTORY_MAX_PAIRS:20}
assistant.history.ttl-minutes=${ASSISTANT_HISTORY_TTL_MINUTES:30}
assistant.context.max-records-per-entity=${ASSISTANT_CONTEXT_MAX_RECORDS:50}
