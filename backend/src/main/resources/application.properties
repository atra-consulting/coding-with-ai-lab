server.port=8080
spring.application.name=crm-backend

# H2 File-based persistence
spring.datasource.url=jdbc:h2:file:./data/crmdb;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false

# JWT
jwt.secret=mySuperSecretKeyForJWTTokenGeneration2024CRMApplication!@#$%^&*()
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=604800000

# Demo mode
app.demo-mode=true
